<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>員工座談會提案平台</title>
  <!-- 引入現代化思源黑體，支援多種字重 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <!-- 載入中動畫 -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div style="font-weight:900; font-size:24px; color:var(--text-main); padding:0 20px; text-align:center;">正在比對歷次座談會紀錄... </div>
    <div style="color:var(--text-muted); font-size:18px; margin-top:10px;">系統比對約需 10–15 秒，請稍候</div>
  </div>

  <div id="sirenOverlay"></div>

  <!-- 內嵌消防車音效 (Web Audio API 將在腳本中呼叫，不需 HTML 標籤) -->

  <div class="topbar">
    <div class="container inner">
      <div class="brand"><span class="brand-icon">💬</span> 員工座談會平台</div>
      <div class="badge" id="today"></div>
    </div>
  </div>

  <main class="container">
    <section class="hero">
      <figure class="heroCard">
        <img src="./1770205128981.jpg" alt="Hero"/>
        <div class="heroOverlay"></div>
        <div class="heroText">
          <div class="title">
            <h1>每一份建議，都是成長的力量</h1>
            <p>透過您的聲音，讓我們一起建設更美好的工作環境 💪</p>
            <div class="heroActions">
              <button class="btn btnPrimary btnHeroCta" id="startFillBtn" type="button">立即填寫提案</button>
              <a class="btn btnGhost btnHeroGhost" href="#formSection">看填寫區</a>
            </div>
          </div>
        </div>
      </figure>
    </section>

    <div class="intro-grid">
      <div class="quote-section">
        <div class="quote-text">「您的每一個想法都很珍貴，無論大小，都是我們進步的動力。請放心分享，我們會認真傾聽。」</div>
      </div>
      <div class="fun-section">
        <div class="fun-image"><img src="./266207be87b246eb8d2e11c63eb5d224.png" alt="趣味"/></div>
        <div class="fun-text">
          <h3>有話就說，不用客氣！</h3>
          <p>開心的事、困擾的事、工作建議，都歡迎分享～</p>
        </div>
      </div>
    </div>

    <section class="section" id="formSection">
      <div class="section-title">
        <h2>填寫您的提案</h2>
        <p>💡 送出後，系統將自動為您比對歷年相似紀錄</p>
      </div>
      
      <label>1. 請問提案是否具名？ <span class="required">*</span></label>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="identity" value="named" checked onclick="toggleId(true)"> ✏️ 記名反映</label>
        <label class="radio-label"><input type="radio" name="identity" value="anon" onclick="toggleId(false)"> 🕵️‍♂️ 不記名反映</label>
      </div>

      <div id="identitySection">
        <label>單位 / 職稱 / 姓名 <span class="required">*</span></label>
        <div class="form-row">
          <input type="text" id="dept" placeholder="單位 (如: 災害搶救科)">
          <input type="text" id="jobTitle" placeholder="職稱">
          <input type="text" id="userName" placeholder="真實姓名">
        </div>
      </div>

      <label>5. 建議事項 <span class="required">*</span></label>
      <textarea id="suggestion" rows="6" placeholder="請詳細說明您在實務上觀察到的問題或建議..."></textarea>

      <label>6. 具體事證 / 建議方案 <span class="required">*</span></label>
      <textarea id="evidence" rows="4" placeholder="請列出具體數據、相關公文或您心目中的解決方案（必填）"></textarea>

      <label>7. 附件 (選填)</label>
      
      <!-- 替換：真實的拖拉上傳區域 -->
      <div id="dropZone" class="upload-area">
        <div style="font-size: 36px; margin-bottom: 8px;">📎</div>
        <span id="dropZoneText">點擊或拖放檔案至此處上傳</span>
        <!-- 隱藏的實際輸入元件 -->
        <input type="file" id="fileInput" multiple style="display: none;">
      </div>
      <!-- 顯示已選取檔案的列表 -->
      <div id="fileList" style="margin-top: 15px; font-size: 17px; color: var(--deep-brown); font-weight: 500;"></div>

      <button class="btn btnPrimary" id="submitBtn" onclick="handleInitialSubmit()">💌 進行比對與送出</button>

      <!-- 比對結果 (預設隱藏) -->
      <div class="hint" id="dupHint">
        <div class="hint-title">📌 歷次座談會相似紀錄比對結果</div>
        <div id="aiSummary" class="hint-text"></div>
        <div class="table-wrapper"><div id="historyTable"></div></div>
        
        <div id="decisionZone" style="margin-top:35px; display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <button class="btn btnSuccess" onclick="window.location.reload()">👌 我已了解，取消本次提交</button>
            <button class="btn btnDanger" onclick="triggerSirenSequence()">內容不同，堅持送出建議</button>
        </div>
      </div>

      <!-- 最終確認框 -->
      <div id="finalConfirmCard">
          <div style="font-size:34px; font-weight:900; color:var(--danger); margin-bottom:15px;">📢 最後確認</div>
          <p style="font-size:20px; margin-bottom:35px; color:var(--text-main); font-weight:500;">系統比對發現已有高度相似的歷年紀錄。<br>建議您參閱辦理結果，避免重複提案浪費行政資源。</p>
          <button class="btn btn-giveup" onclick="window.location.reload()">✅ 了解，我不送出了</button>
          <div style="margin-top:20px;">
             <button class="btn btn-force" onclick="finalSave()">⚠️ 我已確認這是全新事證，正式存檔</button>
          </div>
      </div>
    </section>

    <section class="success" id="successBox">
      <div style="font-size: 100px; margin-bottom: 10px;">🎉</div>
      <h3>提交成功！感謝參與</h3>
      <p style="font-size:22px; color:var(--text-muted); margin:15px 0 40px;">您的寶貴建言已安全存入系統，我們將認真研議。💚</p>
      <img src="./1769910482662.jpg" style="width:100%; max-width:600px; border-radius:var(--radius-lg); box-shadow: var(--shadow-lg);">
    </section>
  </main>

  <script src="./assets/config.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
